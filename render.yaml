services:
  - type: web
    name: nyaayasetu-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GOOGLE_AI_API_KEY
        sync: false        # set manually in Render dashboard — never commit keys
      - key: FIREBASE_PROJECT_ID
        sync: false
